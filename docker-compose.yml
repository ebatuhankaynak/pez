# Everything runs in Docker — no local Python needed. GPU is used automatically when
# the host has the NVIDIA runtime; both stages fall back to CPU otherwise.
#
# Pipeline stages (run in order, or use `all`):
#   docker compose run --rm detect     # 1. TransNetV2 shot boundaries      -> transitions.json
#   docker compose run --rm relabel    # 2. face-label + pick the cut         (rewrites transitions.json)
#   docker compose run --rm segment    # 3. creator/meme segments + cut videos
#   docker compose run --rm split      # 3b. binary split -> split/person, split/meme
#   docker compose run --rm report     # 4. build report.html
#   docker compose run --rm all        # all of the above, in sequence
#
# View the UI (also dockerized):
#   docker compose up serve            # -> http://localhost:8000/  (app, editor, report)
#
# Force CPU even on a GPU host:  add `--gpus 0` is n/a for compose; instead set
#   DEVICE=cpu (detect honors --device) or remove the `gpus:` line below.

x-common: &common
  build:
    context: .
    args:
      # MiniMax text-removal engine is opt-in (heavy: vendored repo + multi-GB weights).
      # Default build = LaMa-only:            docker compose build
      # Full build (adds MiniMax):   MINIMAX=1 docker compose build
      INCLUDE_MINIMAX: "${MINIMAX:-0}"
  image: pezevid-transitions:latest
  # Write outputs as the host user (avoids root-owned files). HOST_UID/HOST_GID come
  # from the .env file (auto-generated to your id -u/-g); falls back to 1000:1000.
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  # Mount the whole repo so containers run the live code + read/write data + serve the
  # HTML, all without a rebuild. The source videos are re-mounted read-only on top.
  volumes:
    - .:/app
    - ./freckled_spike_tiktok:/app/freckled_spike_tiktok:ro
  # Request the GPU (compose v2 honors this for `run`/`up`). Harmless on a CPU-only
  # host — the code detects an actual device and falls back to CPU.
  gpus: all

services:
  detect:
    <<: *common
    command: ["src/detect_transitions.py"]

  relabel:
    <<: *common
    command: ["src/relabel_faces.py", "--qa"]

  split:
    <<: *common
    command: ["src/split_clips.py", "--workers", "8"]

  segment:
    <<: *common
    entrypoint: ["bash", "-c"]
    # stage 3 = face_cut: A) dense sim + luma curves (GPU), B) hybrid+refine segments + cut videos
    command: ["python src/face_cut.py --dump-curves && python src/face_cut.py --split segments"]

  report:
    <<: *common
    # report.html lands at the repo root — that's where serve.py serves it (/report.html)
    # and its nav links (app.html/editor.html) are root-relative.
    command: ["build_report.py", "--out", "report.html"]

  # Run all stages in sequence in one container.
  all:
    <<: *common
    entrypoint: ["bash", "-c"]
    command: ["python src/detect_transitions.py && python src/relabel_faces.py --qa && python src/face_cut.py --dump-curves && python src/face_cut.py --split segments && python src/split_clips.py --workers 8 && python build_report.py --out report.html"]

  # Track 2 — caption text-removal batch over split/meme -> inpaint/eval/out (+ manifest
  # the memes.html tab reads). LaMa engine (baked in). Run `split` first so meme clips exist.
  inpaint:
    <<: *common
    entrypoint: ["python"]
    command: ["inpaint/batch_eval.py", "--all"]

  # Static UI + batu-GT save endpoint (serve.py). `up serve` keeps it running.
  serve:
    <<: *common
    entrypoint: ["python"]
    command: ["serve.py", "8000"]
    ports:
      - "8000:8000"
